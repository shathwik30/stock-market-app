# Nginx reverse proxy for the Next.js app bound on 127.0.0.1:3000.
#
# Install on the VM:
#   sudo apt install -y nginx
#   sudo cp scripts/nginx-stock-market-app.conf /etc/nginx/sites-available/stock-market-app
#   sudo ln -sf /etc/nginx/sites-available/stock-market-app /etc/nginx/sites-enabled/stock-market-app
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# When you add a domain and TLS later:
#   sudo certbot --nginx -d yourdomain.com
# will edit this file in place and add the 443 server block.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Upload size cap (adjust if you ever post large payloads)
    client_max_body_size 10m;

    # Disable buffering for SSE / streaming responses
    proxy_buffering off;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket / HMR support (harmless in production)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass real client identity to the Next.js app
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Sync cron can take ~8s; give headroom
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
